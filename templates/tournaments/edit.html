{% extends "base.html" %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb small mb-0">
        <li class="breadcrumb-item"><a href="{{ url_for('index') }}">Главная</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('list_tournaments') }}">Турниры</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('tournament_detail', tournament_id=tournament.id) }}">{{ tournament.name }}</a></li>
        <li class="breadcrumb-item active" aria-current="page">Редактировать</li>
    </ol>
</nav>

<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4">
        <h1 class="mb-3">Редактировать турнир</h1>
        <p class="text-muted">
            Измените параметры турнира. Будьте внимательны при изменении количества туров,
            если раунды уже начались.
        </p>

        <form method="post" action="{{ url_for('update_tournament', tournament_id=tournament.id) }}">
            <div class="mb-3">
                <label for="name" class="form-label">Название турнира</label>
                <input type="text" class="form-control" id="name" name="name" required maxlength="200"
                       value="{{ tournament.name }}"
                       placeholder="Например: Городской чемпионат 2026">
            </div>

            <div class="mb-3">
                <label for="rounds" class="form-label">Количество туров</label>
                <input type="number" class="form-control" id="rounds" name="rounds" required min="1" max="20"
                       value="{{ tournament.rounds }}">
            </div>

            <div class="mb-3">
                <label for="time_control" class="form-label">Контроль времени</label>
                <input type="text" class="form-control" id="time_control" name="time_control"
                       value="{{ tournament.time_control or '' }}"
                       placeholder="Например: 10+5, 15+10, 90+30">
            </div>

            <div class="mb-3">
                <label for="max_players" class="form-label">Максимум участников</label>
                <input type="number" class="form-control" id="max_players" name="max_players" min="2" step="1"
                       value="{{ tournament.max_players or '' }}"
                       placeholder="Например: 32">
            </div>

            <div class="mb-3">
                <label for="venue" class="form-label">Место проведения</label>
                <input type="text" class="form-control" id="venue" name="venue" maxlength="255"
                       value="{{ tournament.venue or '' }}"
                       placeholder="Например: Шахматный клуб «Белая ладья»">
            </div>

            <div class="mb-3">
                <label for="prize_fund" class="form-label">Призовой фонд</label>
                <input type="text" class="form-control" id="prize_fund" name="prize_fund" maxlength="100"
                       value="{{ tournament.prize_fund or '' }}"
                       placeholder="Например: 50 000 руб">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{{ url_for('tournament_detail', tournament_id=tournament.id) }}" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
