{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Вход</h1>
                <p class="text-muted small mb-4">
                    Войдите в аккаунт, чтобы просматривать турниры. Администраторы могут создавать турниры и вводить результаты.
                </p>

                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="post" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="example@mail.ru">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2">Войти</button>
                    <p class="text-center text-muted small mb-0">
                        Нет аккаунта? <a href="{{ url_for('register_page') }}">Зарегистрироваться</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
